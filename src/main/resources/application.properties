# =====================================
# FitCoach Pro – Application Properties
# =====================================

spring.application.name=fitcoach

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/fitcoach_db
spring.datasource.username=admin
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flutter / clients may send enum values with different casing (e.g. "completed" vs "COMPLETED")
spring.jackson.mapper.accept-case-insensitive-enums=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── JWT ───────────────────────────────────────────────────────────────────────
# Replace this secret with a strong Base64-encoded 256-bit key in production!
app.jwt.secret=ZitCoachSuperSecretKeyForJwtTokenGenerationMustBe256BitsLong!!!
app.jwt.expiration-ms=86400000

# ── Invitation ────────────────────────────────────────────────────────────────
# How many days an invitation token stays valid
app.invitation.expiry-days=7

# ── File Upload ───────────────────────────────────────────────────────────────
# Root directory where uploaded files are persisted on disk (fallback / OCR temp)
app.upload.dir=uploads
# Max individual file size and total multipart request size
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.bucket-name=${AWS_S3_BUCKET:guider-media}
aws.s3.region=${AWS_REGION:eu-north-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:AKIA4KLYYPEAJCFKAXGK}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY: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}

# ── Tesseract OCR ─────────────────────────────────────────────────────────────
# Bare name "tesseract" auto-resolves to Homebrew/macOS/Linux paths under /opt/homebrew, /usr/local, /usr/bin.
# Set a full path if yours is elsewhere (e.g. app.tesseract.path=/opt/homebrew/bin/tesseract)
app.tesseract.path=tesseract
# Optional: path to tessdata directory (leave blank to use system default)
app.tesseract.data-path=

# ── Google SSO ────────────────────────────────────────────────────────────────
# Comma-separated list of accepted OAuth 2.0 client IDs.
# Include ALL client IDs whose tokens the backend should accept:
#   - The web/server client ID (used as serverClientId in the Flutter app)
#   - The iOS native client ID (from GoogleService-Info.plist)
#   - The Android native client ID (from google-services.json, once configured)
#
# CURRENT STATUS:
#   - 570546382170-cm3dmbed4ith4nd0ceor1bk2g127bcr4  → original web client (different GCP project)
#   - 608417544757-b58fi9s0vt223bjva62a9t3so0cum972  → iOS client (Firebase project guider-d202f)
#
# TODO: After enabling Google Sign-In in Firebase Console and downloading the new
#       google-services.json, replace the first entry with the Web Client ID shown
#       under Authentication → Sign-in method → Google → Web SDK configuration.
#       That Web Client ID should also be set as serverClientId in the Flutter app.
app.google.client-ids=608417544757-dldf1n14im4jt8ee3mmcdrkvc8f2p088.apps.googleusercontent.com
# Keep the single-ID key as fallback so existing code that reads it still compiles.
app.google.client-id=608417544757-dldf1n14im4jt8ee3mmcdrkvc8f2p088.apps.googleusercontent.com

# ── Apple SSO ─────────────────────────────────────────────────────────────────
# Your Apple App ID / Bundle ID — used as the expected "aud" claim in Apple JWTs
app.apple.client-id=com.fitcoach.guider
# Apple's public key endpoint (do not change)
app.apple.jwks-url=https://appleid.apple.com/auth/keys
# Apple's issuer claim (do not change)
app.apple.issuer=https://appleid.apple.com

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.fitcoach=DEBUG
logging.level.org.springframework.security=WARN

# ── Error Handling ────────────────────────────────────────────────────────────
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false


# ── Firebase Admin SDK ────────────────────────────────────────────────────────
# Path to Firebase service account JSON key file.
# Alternatively, set the GOOGLE_APPLICATION_CREDENTIALS env var.
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
