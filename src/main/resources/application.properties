# =====================================
# FitCoach Pro – Application Properties
# =====================================

spring.application.name=fitcoach

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/fitcoach_db
spring.datasource.username=admin
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flutter / clients may send enum values with different casing (e.g. "completed" vs "COMPLETED")
spring.jackson.mapper.accept-case-insensitive-enums=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── JWT ───────────────────────────────────────────────────────────────────────
# Replace this secret with a strong Base64-encoded 256-bit key in production!
app.jwt.secret=ZitCoachSuperSecretKeyForJwtTokenGenerationMustBe256BitsLong!!!
app.jwt.expiration-ms=86400000

# ── Invitation ────────────────────────────────────────────────────────────────
# How many days an invitation token stays valid
app.invitation.expiry-days=7

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.fitcoach=DEBUG
logging.level.org.springframework.security=WARN
\n# ── Error Handling ────────────────────────────────────────────────────────────\nspring.mvc.throw-exception-if-no-handler-found=true\nspring.web.resources.add-mappings=false\n
